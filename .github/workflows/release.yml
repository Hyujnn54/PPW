name: Build & Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-windows:
    name: Build Windows Installer
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Build EXE and Installer
        env:
          MONGO_URI: ${{ secrets.MONGO_URI }}
          DATABASE_NAME: ${{ secrets.DATABASE_NAME }}
        run: python build.py

      - name: Verify artifacts
        run: |
          $setup = "dist\PPW-Setup.exe"
          $exe = "dist\PPW-PasswordManager.exe"
          if (!(Test-Path $setup)) { Write-Error "PPW-Setup.exe not found"; exit 1 }
          if (!(Test-Path $exe)) { Write-Error "PPW-PasswordManager.exe not found"; exit 1 }
          $smb = [math]::Round((Get-Item $setup).Length / 1MB, 1)
          $emb = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "PPW-Setup.exe $smb MB"
          Write-Host "PPW-PasswordManager.exe $emb MB"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: PPW ${{ github.ref_name }}
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            dist/PPW-Setup.exe
            dist/PPW-PasswordManager.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: PPW-Windows-${{ github.ref_name }}
          path: |
            dist/PPW-Setup.exe
            dist/PPW-PasswordManager.exe
          retention-days: 90

